<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROBOT CONTROLLER ULTIMATE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            background: radial-gradient(circle at center, #1a1f3c 0%, #050505 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; margin: 0;
            font-family: 'Orbitron', sans-serif; overflow: hidden; touch-action: none;
        }

        /* AYARLAR BUTONU - KONTROLCÜ DIŞINDA */
        .global-settings {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.05); color: #555;
            padding: 8px 15px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.1);
            font-size: 10px; cursor: pointer; transition: 0.3s;
        }
        .global-settings:hover { color: #fff; background: rgba(255,0,0,0.2); }

        /* ANA GÖVDE */
        .controller-body {
            background: rgba(20, 20, 25, 0.98);
            width: 92vw; max-width: 1050px; min-height: 420px;
            padding: 40px 60px; border-radius: 100px; 
            display: flex; flex-direction: row; justify-content: space-between; align-items: center;
            border: 4px solid rgba(255, 0, 0, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
            position: relative;
        }

        @media (max-width: 900px) and (orientation: portrait) {
            .controller-body { transform: rotate(90deg); width: 88vh; min-height: 350px; }
        }

        .joystick-area {
            width: clamp(160px, 24vw, 230px); height: clamp(160px, 24vw, 230px);
            background: #111; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            border: 6px solid #3a0000; box-shadow: inset 0 0 30px #000; position: relative;
        }

        #stick {
            width: 45%; aspect-ratio: 1/1; background: radial-gradient(circle at 35% 35%, #ff3333, #770000);
            border-radius: 50%; border: 3px solid #cc0000; position: absolute; z-index: 10;
            transition: transform 0.05s ease-out; pointer-events: none;
        }

        .center-hub { display:flex; flex-direction:column; align-items:center; gap:10px; flex: 1; }

        .status-lcd {
            background: #051005; width: 220px; height: 80px; border-radius: 15px;
            border: 2px solid #1a331a; color: #00ff41; font-size: 24px;
            display: flex; justify-content: center; align-items: center;
            text-shadow: 0 0 10px #00ff41; box-shadow: inset 0 0 15px #000;
        }

        /* BUTON KÜMESİ VE DEV KISKAÇ */
        .action-cluster { display: grid; grid-template-columns: repeat(2, 100px); gap: 20px; justify-content: end; }

        .btn-round {
            width: 100px; height: 100px; background: #1a1a1a; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: 900; font-size: 32px; color: #ff0000;
            border: 3px solid #333; box-shadow: 0 8px 0 #000; cursor: pointer;
        }

        /* BÜYÜTÜLMÜŞ KISKAÇ BUTONU */
        .btn-space { 
            grid-column: span 2; width: 100%; height: 90px; 
            border-radius: 45px; font-size: 20px; background: #151515; 
            box-shadow: 0 10px 0 #000;
        }

        .active-btn { transform: translateY(6px); box-shadow: 0 2px 0 #000; background: #990000 !important; color: #fff !important; }

        /* LOGO SAĞ ALT */
        .logo { position: absolute; bottom: 30px; right: 60px; opacity: 0.3; pointer-events: none; }

        /* MODAL */
        #settings-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #111; padding: 40px; border-radius: 30px; border: 2px solid #ff0000;
            text-align: center; width: 350px; box-shadow: 0 0 50px rgba(255,0,0,0.2);
        }
        .modal-content input {
            width: 100%; padding: 12px; margin: 20px 0; background: #000; border: 1px solid #444;
            color: #00ffcc; font-family: 'Orbitron'; text-align: center; font-size: 14px;
        }
        .modal-content button {
            background: #ff0000; color: white; border: none; padding: 12px 25px;
            border-radius: 10px; font-family: 'Orbitron'; cursor: pointer; font-weight: 900;
        }
    </style>
</head>
<body>

<div class="global-settings" onclick="openModal()">⚙ AYARLAR</div>

<div id="settings-modal">
    <div class="modal-content">
        <h2 style="color: #fff; margin: 0;">SUNUCU BAĞLANTISI</h2>
        <input type="text" id="ip-input" placeholder="http://192.168.1.X:5000">
        <button onclick="saveIP()">BAĞLAN</button>
        <p onclick="closeModal()" style="color: #555; margin-top: 20px; cursor: pointer; font-size: 12px;">KAPAT</p>
    </div>
</div>

<div class="controller-body">
    <div class="joystick-area" id="joy-area"><div id="stick"></div></div>

    <div class="center-hub">
        <div class="status-lcd" id="display">READY</div>
        <div id="connection-status" style="font-size: 10px; color: #444; letter-spacing: 1px;">BEKLENİYOR...</div>
    </div>

    <div class="action-cluster">
        <div class="btn-round" data-key="q">-</div>
        <div class="btn-round" data-key="e">+</div>
        <div class="btn-round btn-space" data-key=" ">KISKAÇ</div>
    </div>

    <div class="logo"><img src="gamepadlogo.svg" width="90" draggable="false"></div>
</div>

<script>
    let currentIP = localStorage.getItem('robotIP') || "http://127.0.0.1:5000";
    document.getElementById('ip-input').value = currentIP;

    const socket = io(currentIP, { transports: ["websocket"], reconnection: true });
    
    const stick = document.getElementById('stick');
    const joyArea = document.getElementById('joy-area');
    const display = document.getElementById('display');
    const connStatus = document.getElementById('connection-status');

    function openModal() { document.getElementById('settings-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('settings-modal').style.display = 'none'; }
    function saveIP() {
        localStorage.setItem('robotIP', document.getElementById('ip-input').value);
        location.reload(); 
    }

    socket.on('connect', () => {
        connStatus.innerText = currentIP.split("//")[1];
        connStatus.style.color = "#00ffcc";
    });

    socket.on('connect_error', () => {
        connStatus.innerText = "SERVER OFFLINE";
        connStatus.style.color = "#ff3366";
    });

    let activeKey = null;
    let isJoyMoving = false;
    let joyPointerId = null;

    function sendCommand(cmd, label) {
        if (activeKey === cmd) return; 
        activeKey = cmd;
        if (socket.connected) socket.emit('kontrol', { key: cmd === ' ' ? 'space' : cmd });
        display.innerText = label;
    }

    function stopCommand(isMovement = true) {
        if (!activeKey) return;
        if (isMovement && socket.connected) socket.emit('kontrol', { key: 'stop_move' });
        if (isMovement) display.innerText = "IDLE";
        activeKey = null;
        stick.style.transform = `translate(0px, 0px)`;
        document.querySelectorAll('.btn-round').forEach(b => b.classList.remove('active-btn'));
    }

    joyArea.addEventListener('pointerdown', (e) => {
        isJoyMoving = true; joyPointerId = e.pointerId;
        joyArea.setPointerCapture(e.pointerId); handleJoy(e);
    });

    window.addEventListener('pointermove', (e) => { 
        if (isJoyMoving && e.pointerId === joyPointerId) handleJoy(e); 
    });

    window.addEventListener('pointerup', (e) => {
        if (isJoyMoving && e.pointerId === joyPointerId) {
            isJoyMoving = false; joyPointerId = null; stopCommand(true);
        }
    });

    function handleJoy(e) {
        if (e.pointerId !== joyPointerId) return;
        const rect = joyArea.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        let deltaX = e.clientX - centerX;
        let deltaY = e.clientY - centerY;
        const distance = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
        const maxDist = rect.width / 2.5;

        if (distance > maxDist) {
            deltaX *= maxDist / distance; deltaY *= maxDist / distance;
        }

        stick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
        const threshold = maxDist * 0.3;
        if (Math.abs(deltaX) > Math.abs(deltaY)) {
            if (deltaX > threshold) sendCommand('d', 'SAĞ');
            else if (deltaX < -threshold) sendCommand('a', 'SOL');
        } else {
            if (deltaY > threshold) sendCommand('s', 'GERİ');
            else if (deltaY < -threshold) sendCommand('w', 'İLERİ');
        }
    }

    document.querySelectorAll('.btn-round').forEach(btn => {
        btn.addEventListener('pointerdown', () => {
            btn.classList.add('active-btn');
            sendCommand(btn.getAttribute('data-key'), btn.innerText);
        });
        btn.addEventListener('pointerup', () => stopCommand(false));
        btn.addEventListener('pointerleave', () => stopCommand(false));
    });

    document.addEventListener("keydown", (e) => {
        if (e.repeat) return;
        const k = e.key.toLowerCase();
        const labels = { 'w':'İLERİ', 'a':'SOL', 's':'GERİ', 'd':'SAĞ', 'q':'-', 'e':'+', ' ':'KISKAÇ' };
        if (labels[k]) {
            const keyChar = k === ' ' ? ' ' : k;
            const el = document.querySelector(`[data-key="${keyChar}"]`);
            if(el) el.classList.add('active-btn');
            sendCommand(k, labels[k]);
        }
    });

    document.addEventListener("keyup", (e) => stopCommand(['w','a','s','d'].includes(e.key.toLowerCase())));
</script>
</body>
</html>
